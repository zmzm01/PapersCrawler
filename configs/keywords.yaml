domain_description: >
  本研究组关注激光等离子体物理中的粒子加速与辐射产生机制，
  包括激光尾波场电子加速（LWFA）、靶背鞘场离子加速（TNSA）、
  辐射压加速（RPA）、等离子体透镜与束流输运、惯性约束聚变中的
  等离子体诊断、高亮度X/γ射线源、以及机器学习在加速器控制与
  优化中的应用等方向。实验上关注高功率飞秒激光与固体/气体靶的
  相互作用，理论上关注PIC模拟、流体模型与粒子动力学研究。

