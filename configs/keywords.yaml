domain_description: >

# sub_domains: 用于 Phase D 语义相似度计算（仅英文，简练自然语言段落）
# 每条从 domain_description 的对应段落提取，字数 < 300 字确保 512 token 内不截断
sub_domains:
  ion_acceleration: >
    Laser-driven ion acceleration and irradiation applications. Proton beams accelerated
    by PW-class lasers have reached energies approaching 100 MeV. This research optimizes
    laser accelerator physics and experimental techniques to improve ion beam quality
    and controllability, exploring new irradiation phenomena and applications based
    on ultrafast ion beams.
  beam_transport: >
    High-gradient plasma beam transport elements. Capillary discharge plasma systems
    have achieved 8 GeV energy for laser-accelerated electrons. Plasma sustains extremely
    high electromagnetic fields with focusing gradients three orders of magnitude
    higher than conventional magnets, enabling compact centimeter-scale beam transport
    lines and miniaturized laser accelerators.
  control_system: >
    Next-generation accelerator control system research. This work investigates control
    methods through modular hardware and software platform architectures and API interfaces.
    It establishes full-lifecycle equipment control, data acquisition, large-scale
    scientific facility databases, and physical control models. Machine learning and
    optimization algorithms are integrated to design intelligent, automated, and standardized
    control systems.

