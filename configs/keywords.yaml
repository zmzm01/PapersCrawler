# =============================================================================
# 研究领域定义
# =============================================================================
# scope_definition: Phase E LLM prompt 使用的完整领域定义（中文）
# sub_domains_embedding: Phase D 语义相似度使用的浓缩英文段落（<300 words）
#   两字段共享同一组 key，保持一一对应
# =============================================================================

scope_definition:
  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
  # 以下 sub-domain 可根据课题组兴趣独立注释/启用
  # 例如前两个 domain 如果不再关注，注释掉对应 block 即可
  # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

  # ---------- Sub-Domain 1: 尾场加速 ----------
  laser_wakefield_acceleration:
    description: >
      本方向关注基于等离子体的尾场加速技术，利用高功率激光或高能
      粒子束在等离子体中激发大振幅尾场，实现超高梯度粒子加速。
      研究内容包括加速机制、注入与俘获过程、束流品质优化、能量增益、
      束流稳定性、发射度控制、能散控制、多级加速结构以及束流输运与
      匹配等问题。
    topics:
      - "Laser Wakefield Acceleration (LWFA) — 利用超短超强激光脉冲在等离子体中激发尾场加速电子"
      - "Plasma Wakefield Acceleration (PWFA) — 利用高能电子束或质子束驱动等离子体尾场"
      - "Self-injection and external injection — 电子注入与俘获机制、电离注入"
      - "Beam loading — 束流负载效应对加速梯度和能散的影响"
      - "Multi-stage acceleration — 多级加速结构与级间耦合"
      - "Capillary discharge plasma waveguide — 毛细管放电等离子体波导用于导引激光"
      - "High-brightness electron beam generation — 高品质电子束产生与操控"
      - "Betatron radiation and X-ray sources — 电子束在等离子体中振荡产生的辐射"

  # ---------- Sub-Domain 2: 激光驱动离子加速 ----------
  laser_driven_ion_acceleration:
    description: >
      本方向关注利用高功率激光与固体或气体靶相互作用驱动离子和
      质子加速。研究内容包括加速机制、束流品质提升、靶物理以及
      应用研究。
    topics:
      - "Target Normal Sheath Acceleration (TNSA) — 靶背鞘层加速机制，质子/离子加速"
      - "Radiation Pressure Acceleration (RPA) — 辐射压加速机制"
      - "其他新型离子加速机制 — Breakout Afterburner (BOA), shock acceleration, relativistic transparency 等"
      - "Monoenergetic ion beam generation — 单能离子束产生方法与能散控制"
      - "Particle-in-cell (PIC) simulation of laser-ion interaction"
      - "激光-固体靶相互作用物理 — preplasma 形成、激光吸收机制"
      - "Enhanced-TNSA using structured targets — 微结构靶、泡沫靶、多层靶提升能量和品质"
      - "Point-to-point magnetic beamline transport for laser-driven ions"

  # ---------- Sub-Domain 3: 激光等离子体物理与诊断 ----------
  laser_plasma_physics_and_diagnostics:
    description: >
      本方向关注超强激光与等离子体相互作用的基础物理过程，以及
      用于测量等离子体参数的各种诊断技术。研究内容包括激光传播、
      自聚焦、自调制、参数不稳定性、等离子体波激发、等离子体通道
      形成与控制等。
    topics:
      - "Relativistic self-focusing and self-modulation of laser pulses in plasma"
      - "Laser propagation in underdense and near-critical density plasma"
      - "Parametric instabilities in laser-plasma interaction"
      - "Plasma channel formation and capillary discharge plasma sources"
      - "Gas jet and gas cell plasma sources — 密度分布控制与表征"
      - "Plasma diagnostics — interferometry, Thomson scattering, spectroscopy"
      - "Shadowgraphy and Schlieren imaging of plasma dynamics"
      - "Plasma density, temperature, and field reconstruction"

  # ---------- Sub-Domain 4: 高梯度束流传输与等离子体光学 ----------
  high_gradient_beam_transport:
    description: >
      本方向关注利用等离子体替代传统磁铁实现束流聚焦、操控和
      输运。研究内容包括主动等离子体透镜、等离子体聚焦系统、
      高梯度束流操控元件以及紧凑型束线设计。目标是在先进加
      速器中实现高梯度、小型化的束流输运系统。
    topics:
      - "Active Plasma Lens (APL) — 主动等离子体透镜聚焦机制"
      - "Plasma-based beam transport and matching — 束流匹配与传输"
      - "High-gradient beam manipulation elements"
      - "Compact beamline design for laser-driven particle beams"
      - "Beam dynamics in plasma focusing channels"
      - "Plasma optics and electromagnetic field manipulation"
      - "束流发射度匹配与传输效率优化"
      - "Critical-density plasma lens"

  # ---------- Sub-Domain 5: 束流辐照与应用 ----------
  beam_irradiation_and_applications:
    description: >
      本方向关注激光加速器产生的电子束、质子束或离子束在科学
      与工程中的应用。研究内容包括材料辐照、生物医学应用、高
      能量密度物理实验以及束流与物质相互作用过程。
    topics:
      - "Proton and ion irradiation — 材料辐照效应与损伤机制"
      - "FLASH radiotherapy — 超高剂量率放射治疗的生物学效应"
      - "Proton therapy and hadron therapy — 质子治疗与重离子治疗"
      - "High Energy Density Physics (HEDP) — 高能量密度物理实验"
      - "Warm Dense Matter (WDM) — 温稠密物质产生与诊断"
      - "Radiobiology — 超短脉冲束流的生物学效应"
      - "Laser-driven radiography and imaging — 激光驱动射线照相"
      - "Beam-matter interaction at ultrashort timescales"

  # ---------- Sub-Domain 6: 加速器控制与人工智能 ----------
  accelerator_control_automation_and_ai:
    description: >
      本方向关注利用现代控制理论、机器学习和人工智能技术提升
      先进加速器的运行效率、稳定性和自动化水平。研究内容包括
      控制系统架构、实验自动化、数字孪生、在线优化、代理模型、
      强化学习以及自主实验系统。
    topics:
      - "Accelerator control systems and EPICS architecture"
      - "Machine learning for accelerator optimization — 机器学习加速器优化"
      - "Bayesian optimization for online tuning — 贝叶斯优化在线调束"
      - "Reinforcement learning for autonomous accelerator operation"
      - "Digital twin — 加速器数字孪生系统"
      - "Real-time data acquisition and feedback control"
      - "Physics-based control models for accelerators"
      - "注：仅当 AI/ML 明确应用于加速器、束流或等离子体系统时视为相关"

# ---------------------------------------------------------------------------
# 不相关领域定义（用于降低误判）
# ---------------------------------------------------------------------------
irrelevant_fields:
  description: >
    以下领域即使出现 "plasma"、"accelerator"、"beam" 或 "AI" 等关键词，
    通常也不应视为本课题组关注范围：
  topics:
    - "Fusion: Tokamak, Stellarator, magnetic confinement fusion, ITER — 除非论文明确讨论其技术在先进加速器中的应用"
    - "Space plasma: Solar wind, Magnetosphere, astrophysical plasma, cosmic rays"
    - "Semiconductor plasma: Plasma etching, deposition, fabrication, plasma-enhanced CVD"
    - "Collider physics: Standard Model phenomenology, dark matter models, neutrino oscillation"
    - "General laser physics: 不与粒子加速直接相关的纯激光物理研究"
    - "General AI/ML: Large Language Models, Computer Vision, NLP, foundation models — 除非明确应用于加速器/束流/等离子体系统"

# =============================================================================
# Phase D 语义相似度用浓缩英文段落
# 供 sentence-transformers 编码为向量计算余弦相似度
# 每条 < 300 words，仅英文，简练自然语言不含缩写
# =============================================================================
sub_domains_embedding:
  laser_wakefield_acceleration: >
    Plasma-based wakefield acceleration driven by intense laser pulses or high-energy particle beams achieving ultra-high acceleration gradients exceeding conventional radio-frequency cavities. Research covers electron injection mechanisms including self-injection and controlled external injection schemes, beam loading effects, and optimization of beam quality including energy spread and emittance. Multi-stage acceleration architectures and capillary discharge plasma waveguides are studied for compact high-brightness electron sources.
  laser_driven_ion_acceleration: >
    High-power laser interaction with solid or gas targets to accelerate ions and protons to multi-MeV energies. Mechanisms studied include target normal sheath acceleration and radiation pressure acceleration. Research explores structured and multilayer targets to enhance beam energy and quality. Particle-in-cell simulations guide experimental design for monoenergetic ion sources with controlled divergence and energy spread.
  laser_plasma_physics_and_diagnostics: >
    Fundamental processes of intense laser interactions with plasma including relativistic self-focusing and self-modulation. Plasma channel formation via capillary discharge and laser-induced ionization for guided propagation. Diagnostic techniques include interferometry, Thomson scattering, optical spectroscopy, and shadowgraphy for measuring plasma density distributions, temperature, and electromagnetic field structures.
  high_gradient_beam_transport: >
    Plasma-based alternatives to conventional magnetic beam transport and focusing elements. Active plasma lenses achieve focusing gradients orders of magnitude higher than quadrupole magnets while maintaining compact form factors. Research addresses beam dynamics and matching in plasma channels, emittance preservation, and design of compact beamlines for laser-driven particle beams.
  beam_irradiation_and_applications: >
    Applications of laser-accelerated particle beams including material irradiation studies and biomedical applications. Research covers high energy density physics and warm dense matter experiments. Ultra-short pulsed proton and ion beams enable FLASH radiotherapy studies and time-resolved radiobiology experiments at unprecedented dose rates.
  accelerator_control_automation_and_ai: >
    Modern control theory and artificial intelligence applied to accelerator operations and optimization. Bayesian optimization and reinforcement learning methods enable automated online tuning and autonomous operation. Digital twin systems integrate real-time diagnostics with physics models for improved stability and efficiency.
