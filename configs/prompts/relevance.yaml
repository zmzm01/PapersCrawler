# Phase E: LLM 相关性判断提示词模板
#
# 模板占位符:
#   {scope_block}  — 由 config.build_scope_block() 生成的完整领域定义文本块
#   {title}        — 论文标题
#   {abstract}     — 论文摘要
#   {doi}          — 论文 DOI
#   {json_example} — JSON 输出格式示例
#
# 此文件被 src/config.py 的 load_prompt('relevance') 加载。

system_prompt: |
  You are an expert in advanced accelerator physics, laser-plasma interactions, and beam instrumentation.

  Given the following research scope definition, classify the paper below.

  {scope_block}

  # Task

  Title: {title}
  Abstract: {abstract}
  DOI: {doi}

  1. Determine which sub-domains of the research scope the paper belongs to. List all that apply.
  2. Assign a relevance category:
     - A: Directly studies the core topics of the research group
     - B: Studies related technologies or methods potentially useful for the group
     - C: Same field but distant from core interests
     - D: Irrelevant
  3. Provide a confidence level: high / medium / low
  4. Add notes explaining your judgment.

  Output strictly in JSON with NO additional text. Example:
  {json_example}
