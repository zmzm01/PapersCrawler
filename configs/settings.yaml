# =============================================================================
# PapersCrawler 运行参数配置
# =============================================================================
# 此文件用于配置流水线的运行参数。
# 修改后重启流水线或 WebUI 即可生效。
# 敏感信息（API 密钥、SMTP 密码）请放在 .env 中，不要放在这里。
# =============================================================================

# ---------------------------------------------------------------------------
# 阶段开关 (true = 跳过该阶段)
# ---------------------------------------------------------------------------
skip_phases:
  A_RSS: false       # RSS 发现路径
  A_CR: false        # CrossRef 发现路径
  B: false           # CrossRef 元数据补全
  C: false           # Publisher 页面爬取
  D: false           # 语义相似度排序（仅排序参考，不参与过滤）
  E: false           # LLM 相关性判断
  E2: false          # MinerU PDF 解析
  F: false           # LLM 论文总结
  G: false           # 报告生成
  H: true            # 邮件推送

# ---------------------------------------------------------------------------
# LLM API 配置
# ---------------------------------------------------------------------------
llm:
  # 相关性判断（Phase E）— 快速模型，不需深度思考
  relevance:
    model: deepseek-v4-flash
    thinking: disabled
    timeout: 300

  # 论文总结（Phase F）— 更强模型，开启深度思考
  summary:
    model: deepseek-v4-pro
    thinking: enabled
    timeout: 300

  # 并发上限：Phase E/F 同时发起的 DeepSeek 请求数
  concurrent_max: 100

# ---------------------------------------------------------------------------
# 流水线运行参数
# ---------------------------------------------------------------------------
pipeline:
  # Phase A CrossRef 发现: 回溯天数（每日增量模式取今天往前 N 天）
  crossref_lookback_days: 1

  # 每阶段最多处理 N 篇论文 (0 = 不限制)
  max_papers_per_phase: 0

  # 过滤 Nature 新闻 (d41586 DOI)，只保留研究论文
  skip_nature_news: true

# ---------------------------------------------------------------------------
# Publisher 爬虫参数
# ---------------------------------------------------------------------------
publisher:
  # 同 publisher 内页面间随机延迟范围 (秒)
  page_delay_min: 3
  page_delay_max: 5

  # 同 publisher 内连续抓取失败 N 篇后自动中止该 publisher
  max_consecutive_failures: 3

  # 需要代理的出版商（key 为 publisher 标识，value 为 cloakbrowser proxy 字典）
  proxy:
    optica:
      server: "http://127.0.0.1:10808"

# ---------------------------------------------------------------------------
# FormulaFixer 公式修复
# ---------------------------------------------------------------------------
formula_fix:
  # true = 跳过修复，false = 启用（对 json.loads 后的纯文本做二次公式包裹修正）
  skip: false
  # true = 跳过 needs_fix() 检测，所有字段强制送修
  force: false

# ---------------------------------------------------------------------------
# 语义模型（Phase D）
# ---------------------------------------------------------------------------
semantic:
  # 模型路径（相对于 data/ 目录，首次需从 HuggingFace 下载后放入）
  model_path: "models/bge-base-en-v1.5"
