<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PapersCrawler - {% block title %}Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h1>PapersCrawler</h1>
      </div>
      <ul class="sidebar-nav">
        <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a></li>
        <li><a href="/pipeline" class="{% if request.url.path == '/pipeline' %}active{% endif %}">Pipeline</a></li>
        <li><a href="/report" class="{% if request.url.path == '/report' %}active{% endif %}">Report</a></li>
        <li><a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">Logs</a></li>
        <li><a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">Config</a></li>
      </ul>
    </nav>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
