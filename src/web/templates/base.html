<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PapersCrawler - {% block title %}Home{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h1>PapersCrawler</h1>
        <button id="lang-toggle" class="lang-toggle" onclick="switchLanguage(currentLang === 'zh' ? 'en' : 'zh')">EN</button>
      </div>
      <ul class="sidebar-nav">
        <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}"><span data-i18n="nav.home">Home</span></a></li>
        <li><a href="/pipeline" class="{% if request.url.path == '/pipeline' %}active{% endif %}"><span data-i18n="nav.pipeline">Pipeline</span></a></li>
        <li><a href="/papers" class="{% if request.url.path == '/papers' %}active{% endif %}"><span data-i18n="nav.papers">Papers</span></a></li>
        <li><a href="/report" class="{% if request.url.path == '/report' %}active{% endif %}"><span data-i18n="nav.report">Report</span></a></li>
        <li><a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}"><span data-i18n="nav.logs">Logs</span></a></li>
        <li><a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}"><span data-i18n="nav.config">Config</span></a></li>
      </ul>
    </nav>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-title">Confirm</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm" onclick="closeModal()">Confirm</button>
      </div>
    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
