{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block content %}
<h2>Pipeline Logs</h2>

<div class="log-controls">
  <label>Filter:
    <select id="log-filter" onchange="filterLogs()">
      <option value="ALL">ALL</option>
      <option value="ERROR">ERROR</option>
      <option value="WARNING">WARNING</option>
      <option value="INFO">INFO</option>
      <option value="DEBUG">DEBUG</option>
    </select>
  </label>
</div>

<pre id="log-viewer" class="log-viewer"><code>{{ log_content }}</code></pre>

<script>
const logViewer = document.getElementById('log-viewer');
let rawLogText = logViewer.textContent;

const evtSource = new EventSource('/pipeline/logs');
evtSource.onmessage = function(e) {
  const data = JSON.parse(e.data);
  rawLogText += data.text;
  filterLogs();
};

function filterLogs() {
  const level = document.getElementById('log-filter').value;
  const lines = rawLogText.split('\n');
  if (level === 'ALL') {
    logViewer.innerHTML = lines.join('\n');
  } else {
    logViewer.innerHTML = lines.filter(l => l.includes('[' + level + ']')).join('\n');
  }
  logViewer.scrollTop = logViewer.scrollHeight;
}
</script>
{% endblock %}
