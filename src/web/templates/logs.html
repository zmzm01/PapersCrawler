{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block content %}
<h2>Pipeline Logs</h2>

<div class="log-controls">
  <label>
    Filter:
    <select id="log-filter" onchange="filterLogs()">
      <option value="ALL">ALL</option>
      <option value="ERROR">ERROR</option>
      <option value="WARNING">WARNING</option>
      <option value="INFO">INFO</option>
      <option value="DEBUG">DEBUG</option>
    </select>
  </label>
  <button class="btn btn-sm btn-secondary" onclick="clearFilter()">Clear Filter</button>
</div>

<pre id="log-viewer" class="log-viewer"><code>{{ log_content }}</code></pre>

<script>
const logViewer = document.getElementById('log-viewer');
const evtSource = new EventSource('/pipeline/logs');
evtSource.onmessage = function(e) {
  const data = JSON.parse(e.data);
  logViewer.innerHTML += data.text;
  logViewer.scrollTop = logViewer.scrollHeight;
};

function filterLogs() {
  const level = document.getElementById('log-filter').value;
  const lines = logViewer.innerHTML.split('\n');
  const filtered = lines.filter(line => {
    if (level === 'ALL') return true;
    return line.includes('[' + level + ']');
  });
  logViewer.innerHTML = filtered.join('\n');
}

function clearFilter() {
  document.getElementById('log-filter').value = 'ALL';
  filterLogs();
}
</script>
{% endblock %}
