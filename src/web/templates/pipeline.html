{% extends "base.html" %}
{% block title %}Pipeline Control{% endblock %}
{% block content %}
<h2>Pipeline Control</h2>

<div class="pipeline-toolbar">
  <button class="btn btn-primary" onclick="runAll()" id="run-all-btn">Run All Phases</button>
  <span id="running-status" class="running-indicator"></span>
</div>

<div id="phase-charts" class="chart-grid"></div>

<table class="phase-table" id="phase-table">
  <thead>
    <tr><th>Phase</th><th>Label</th><th>Status</th><th>Actions</th></tr>
  </thead>
  <tbody>
    {% for phase in phases %}
    <tr>
      <td><strong>{{ phase.key }}</strong></td>
      <td>{{ phase.label }}</td>
      <td><span class="badge badge-pending" id="badge-{{ phase.key }}">-</span></td>
      <td class="phase-actions">
        <button class="btn btn-sm btn-primary" onclick="runPhase('{{ phase.key }}')" id="run-{{ phase.key }}">Run</button>
        <button class="btn btn-sm btn-secondary" onclick="confirmReset('{{ phase.key }}')" id="reset-{{ phase.key }}">Reset</button>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<h3>Live Log</h3>
<div class="log-controls">
  <label>Filter:
    <select id="log-filter" onchange="filterPipelineLog()">
      <option value="ALL">ALL</option>
      <option value="ERROR">ERROR</option>
      <option value="WARNING">WARNING</option>
      <option value="INFO">INFO</option>
      <option value="DEBUG">DEBUG</option>
    </select>
  </label>
</div>
<pre id="log-viewer" class="log-viewer"><code>Waiting for log output...</code></pre>

<script>
const logViewer = document.getElementById('log-viewer');
let rawLogText = logViewer.textContent;
const evtSource = new EventSource('/pipeline/logs');
evtSource.onmessage = function(e) {
  const data = JSON.parse(e.data);
  rawLogText += data.text;
  applyPipelineLogFilter();
};

function applyPipelineLogFilter() {
  const level = document.getElementById('log-filter').value;
  const lines = rawLogText.split('\n');
  if (level === 'ALL') {
    logViewer.innerHTML = lines.join('\n');
  } else {
    logViewer.innerHTML = lines.filter(l => l.includes('[' + level + ']')).join('\n');
  }
  logViewer.scrollTop = logViewer.scrollHeight;
}

function filterPipelineLog() { applyPipelineLogFilter(); }

async function refreshCharts() {
  const r = await fetch('/pipeline/status');
  const data = await r.json();
  const container = document.getElementById('phase-charts');
  container.innerHTML = '';
  for (const [key, counts] of Object.entries(data.phases)) {
    const total = counts.success + counts.failed + counts.skipped + counts.pending || 1;
    const pct = n => ((n / total) * 100).toFixed(1);
    const div = document.createElement('div');
    div.className = 'chart-row';
    div.innerHTML = `
      <div class="chart-label">${key}</div>
      <div class="chart-bars">
        <div class="chart-bar success" style="width:${pct(counts.success)}%" title="success: ${counts.success}"></div>
        <div class="chart-bar failed" style="width:${pct(counts.failed)}%" title="failed: ${counts.failed}"></div>
        <div class="chart-bar skipped" style="width:${pct(counts.skipped)}%" title="skipped: ${counts.skipped}"></div>
        <div class="chart-bar pending" style="width:${pct(counts.pending)}%" title="pending: ${counts.pending}"></div>
      </div>
      <div class="chart-counts">
        <span class="c-success">${counts.success}</span>
        <span class="c-failed">${counts.failed}</span>
        <span class="c-skipped">${counts.skipped}</span>
        <span class="c-pending">${counts.pending}</span>
      </div>`;
    container.appendChild(div);
    // Update badge
    const badge = document.getElementById('badge-' + key);
    if (badge) {
      const total = counts.success + counts.failed + counts.skipped + counts.pending;
      badge.textContent = total + ' papers';
      badge.className = 'badge badge-pending';
    }
  }
}
refreshCharts();
setInterval(refreshCharts, 10000);

function setRunning(phase) {
  document.getElementById('running-status').textContent = phase ? 'Running: ' + phase : '';
}

async function runPhase(phase) {
  setRunning(phase);
  const btn = document.getElementById('run-' + phase);
  btn.disabled = true;
  const r = await fetch('/pipeline/run/' + phase, { method: 'POST' });
  const data = await r.json();
  if (data.error) { alert(data.error); setRunning(''); btn.disabled = false; }
  setTimeout(() => { btn.disabled = false; setRunning(''); }, 5000);
}

async function runAll() {
  setRunning('ALL');
  document.getElementById('run-all-btn').disabled = true;
  const r = await fetch('/pipeline/run-all', { method: 'POST' });
  const data = await r.json();
  if (data.error) { alert(data.error); setRunning(''); document.getElementById('run-all-btn').disabled = false; }
  setTimeout(() => { document.getElementById('run-all-btn').disabled = false; setRunning(''); }, 10000);
}

async function confirmReset(phase) {
  // Step 1: count impact (read-only, no mutation)
  const r = await fetch('/pipeline/reset/' + phase, { method: 'POST' });
  const data = await r.json();
  if (data.error) { alert(data.error); return; }
  let msg = 'Phase ' + phase + ' will be reset.\n\nAffected columns:\n';
  let hasImpact = false;
  for (const [col, count] of Object.entries(data.impact)) {
    if (count > 0) { msg += '  - ' + col + ': ' + count + ' papers\n'; hasImpact = true; }
  }
  if (!hasImpact) { alert('No papers to reset for Phase ' + phase + '.'); return; }
  msg += '\nConfirm reset?';
  if (!confirm(msg)) return;

  // Step 2: execute reset (only after confirmation)
  const r2 = await fetch('/pipeline/reset/' + phase + '/execute', { method: 'POST' });
  const d2 = await r2.json();
  if (d2.ok) { alert('Reset complete.'); refreshCharts(); }
}
</script>
{% endblock %}
