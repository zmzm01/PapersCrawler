<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{report_title}</title>
</head>
<body style="margin:0;padding:0;background-color:#fef9e7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" style="width:100%;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" style="max-width:600px;width:100%;border-collapse:collapse;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.1);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#f97316,#ec4899);padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#ffffff;font-size:28px;font-weight:700;">🎉 啊哈哈，论文来咯！</h1>
              <p style="margin:8px 0 0;color:#fde68a;font-size:14px;">PapersCrawler 文献追踪小助手为您播报</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px;">
              <p style="margin:0 0 16px;color:#374151;font-size:15px;line-height:1.8;">嘿，朋友！👋</p>
              <p style="margin:0 0 16px;color:#374151;font-size:16px;line-height:1.8;font-weight:500;">{report_title}</p>
              <div style="margin:0 0 24px;padding:16px 20px;background-color:#fefce8;border-left:4px solid #f59e0b;border-radius:4px;">
                <p style="margin:0;color:#92400e;font-size:14px;line-height:1.8;">{paper_msg}</p>
              </div>
              {attachment_section}
              <p style="margin:24px 0 0;color:#6b7280;font-size:13px;line-height:1.8;">
                以上就是本期内容啦～<br>
                如果觉得有用，记得给 PapersCrawler 加点鸡腿 🍗<br>
                如果觉得没用…嗯，那也得忍着 😏
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px;background-color:#fffbeb;border-top:2px dashed #fbbf24;">
              <p style="margin:0 0 8px;color:#92400e;font-size:13px;text-align:center;font-weight:500;">
                💩 欢迎接手屎山代码
              </p>
              <p style="margin:8px 0 0;color:#9ca3af;font-size:12px;text-align:center;">
                开源地址：
                <a href="https://github.com/zmzm01/PapersCrawler" style="color:#f97316;text-decoration:none;font-weight:500;">github.com/zmzm01/PapersCrawler</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
